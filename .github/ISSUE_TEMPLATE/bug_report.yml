name: 🐛 Bug Report
description: Report something that's broken
title: "[Bug] "
labels: ["bug", "needs-review"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
      placeholder: "The system should..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: "Instead, it..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your system details
      value: |
        - **OS:** (e.g., Ubuntu 22.04, macOS 14.0)
        - **Python Version:** (e.g., 3.10.12)
        - **TokenSaver Version:** (e.g., 1.0.0)
        - **GPU/CPU:** (e.g., NVIDIA RTX 4090 / Apple M3)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste any relevant logs or stack traces
      render: shell

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How critical is this bug?
      options:
        - Critical - System broken / Data loss
        - High - Major feature unusable
        - Medium - Workaround exists
        - Low - Cosmetic / minor issue
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      description: Before submitting, please confirm
      options:
        - label: I've searched existing issues and this hasn't been reported
          required: true
        - label: I can reproduce this consistently
          required: false