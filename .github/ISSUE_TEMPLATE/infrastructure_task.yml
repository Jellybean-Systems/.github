name: 🔧 Infrastructure Task
description: Setup, configuration, or technical infrastructure
title: "[Infra] "
labels: ["infra"]
assignees: []

body:
  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: What needs to be set up or configured?
      placeholder: "We need to configure..."
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: Requirements
      description: What does "done" look like?
      value: |
        - [ ] Requirement 1
        - [ ] Requirement 2
        - [ ] Requirement 3
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What type of infrastructure?
      options:
        - API Setup
        - Cloud Services
        - CI/CD
        - Database
        - Networking
        - Security
        - Monitoring
        - Other
    validations:
      required: true

  - type: textarea
    id: credentials
    attributes:
      label: Credentials/API Keys Needed
      description: List any accounts or keys required
      placeholder: |
        - Service: ___________
        - API Key location: ___________
        - Billing setup required: Yes/No

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - Blocks other work
        - P1 - Needed this sprint
        - P2 - Can wait
        - P3 - Backlog
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Links, documentation, or special considerations